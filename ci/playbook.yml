---
- name: Apply GitLab Runner role on native host
  hosts: localhost
  connection: local
  gather_facts: true

  vars_files:
    - vars/common.yml

  roles:
    - role: "{{ playbook_dir }}/.."

  tasks:
    - name: Verify config.toml exists
      ansible.builtin.stat:
        path: "{{ gitlab_runner_config_file }}"
      register: runner_config

    - name: Assert GitLab Runner was configured
      ansible.builtin.assert:
        that:
          - runner_config.stat.exists
          - runner_config.stat.isreg
          - "'CI Shell Runner' in lookup('file', gitlab_runner_config_file)"
        fail_msg: "config.toml is missing or does not contain the CI Shell Runner entry"
