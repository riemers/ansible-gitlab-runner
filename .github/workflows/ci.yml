---
name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - actions
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: molecule/requirements.txt

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-lint ansible
          ansible-galaxy collection install -r requirements.yml
          mkdir -p ~/.ansible/roles
          ln -sfn "$GITHUB_WORKSPACE" ~/.ansible/roles/riemers.gitlab_runner

      - name: Run ansible-lint
        run: ansible-lint

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: molecule/requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r molecule/requirements.txt
          ansible-galaxy collection install -r requirements.yml
          mkdir -p ~/.ansible/roles
          ln -sfn "$GITHUB_WORKSPACE" ~/.ansible/roles/riemers.gitlab_runner

      - name: Run Molecule scenarios
        run: |
          set -euo pipefail
          for scenario in default config-update; do
            echo "==> molecule test -s ${scenario}"
            molecule test -s "${scenario}"
          done
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
