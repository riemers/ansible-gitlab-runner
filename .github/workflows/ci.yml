---
name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - actions
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-lint ansible
          ansible-galaxy collection install -r requirements.yml
          mkdir -p ~/.ansible/roles
          ln -sfn "$GITHUB_WORKSPACE" ~/.ansible/roles/riemers.gitlab_runner

      - name: Run ansible-lint
        run: ansible-lint

  molecule-linux:
    name: Linux (Molecule)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r molecule/requirements.txt
          ansible-galaxy collection install -r requirements.yml
          mkdir -p ~/.ansible/roles
          ln -sfn "$GITHUB_WORKSPACE" ~/.ansible/roles/riemers.gitlab_runner

      - name: Run Molecule tests
        run: bash run_tests.sh

  native-integration:
    name: "${{ matrix.label }} integration"
    needs: lint
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            runner: macos-latest
          - label: Windows
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible and collections
        run: |
          python -m pip install --upgrade pip
          pip install ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Link role for testing (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p ~/.ansible/roles
          ln -sfn "$GITHUB_WORKSPACE" ~/.ansible/roles/riemers.gitlab_runner

      - name: Link role for testing (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.ansible\roles" | Out-Null
          if (Test-Path "$env:USERPROFILE\.ansible\roles\riemers.gitlab_runner") {
            Remove-Item "$env:USERPROFILE\.ansible\roles\riemers.gitlab_runner" -Force -Recurse
          }
          cmd /c mklink /J "$env:USERPROFILE\.ansible\roles\riemers.gitlab_runner" "$env:GITHUB_WORKSPACE"

      - name: Install mock server dependencies
        run: pip install -r molecule/default/mock/requirements.txt

      - name: Start mock GitLab server (Unix)
        if: runner.os != 'Windows'
        run: |
          python molecule/default/mock/server.py 8000 > mock-server.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://127.0.0.1:8000/; then
              exit 0
            fi
            sleep 1
          done
          echo "Mock server failed to start"
          cat mock-server.log
          exit 1

      - name: Start mock GitLab server (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $job = Start-Job { python molecule/default/mock/server.py 8000 }
          for ($i = 0; $i -lt 30; $i++) {
            try {
              Invoke-WebRequest -Uri http://127.0.0.1:8000/api/v4/runners -Method POST -Body '{}' -ContentType 'application/json' -ErrorAction Stop | Out-Null
            } catch {
              if ($_.Exception.Response.StatusCode.value__ -eq 400) {
                exit 0
              }
            }
            Start-Sleep -Seconds 1
          }
          Receive-Job $job
          throw "Mock server failed to start"

      - name: Syntax-check native integration playbook
        run: ansible-playbook ci/playbook.yml --syntax-check

      - name: Run native integration playbook
        run: ansible-playbook ci/playbook.yml -i localhost, -c local

      - name: Upload mock server log on failure (Unix)
        if: failure() && runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: mock-server-log-${{ matrix.label }}
          path: mock-server.log
