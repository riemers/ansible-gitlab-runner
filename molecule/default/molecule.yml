---
driver:
  name: docker
  docker_networks:
    - name: testnet
      ipam_config:
        - subnet: "172.28.0.0/16"
      dns:
        - 127.0.0.11

platforms:
  - name: mock
    image: python:3.12-slim
    pre_build_image: true
    networks:
      - name: testnet
    command: >
      bash -lc "pip install -r /srv/mock/requirements.txt && python /srv/mock/server.py 8000"
    volumes:
      - "${MOLECULE_SCENARIO_DIRECTORY}/mock:/srv/mock:ro"

  - name: runner
    image: geerlingguy/docker-ubuntu2204-ansible
    pre_build_image: true
    networks:
      - name: testnet
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
    command: /sbin/init

provisioner:
  name: ansible
  env:
    EXPECTED_TOML: expected/initial.toml
  inventory:
    hosts:
      all:
        hosts:
          mock:
          runner:

verifier:
  name: testinfra
  options:
    v: true

scenario:
  test_sequence:
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - verify
    - destroy
